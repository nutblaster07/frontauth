<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">

  <!-- BRAND -->
  <div class="brand">
    <div class="brand-name">YourApp</div>
  </div>

  <!-- CARD -->
  <div class="card">

    <div class="card-header">
      <h2 class="card-title">Create account</h2>
      <p class="card-subtitle">Sign up with email & phone verification</p>
    </div>

    <div class="card-body">

      <div id="globalAlert"></div>

      <!-- STEP DOTS -->
      <div class="step-dots">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>

      <!-- STEP 1 -->
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <input type="text" id="signupName" placeholder="Enter your name">
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <input type="email" id="signupEmail" placeholder="Enter your email">
        </div>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <div class="input-wrap">
          <span class="phone-prefix">+91</span>
          <input type="tel" id="signupPhone" class="phone-input" placeholder="9876543210">
        </div>
      </div>

      <button class="btn btn-primary" onclick="sendSignupEmailOtp()">
        Send Email OTP
      </button>

      <!-- STEP 2 -->
      <div id="emailOtpSection" class="otp-section">

        <div class="otp-hint">
          Enter OTP sent to <strong id="emailText"></strong>
        </div>

        <div id="emailOtpGroup" class="otp-group">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
        </div>

        <button class="btn btn-accent" onclick="verifySignupEmailOtp()">
          Verify Email
        </button>
      </div>

      <!-- STEP 3 -->
      <div id="phoneOtpSection" class="otp-section">

        <div class="otp-hint">
          Enter OTP sent to your phone
        </div>

        <div id="phoneOtpGroup" class="otp-group">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
          <input class="otp-input" maxlength="1">
        </div>

        <button class="btn btn-accent" onclick="verifySignupPhoneOtp()">
          Create Account
        </button>
      </div>

      <!-- SWITCH -->
      <div class="switch-mode">
        Already have an account?
        <a href="login.html">Login</a>
      </div>

    </div>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/signup.js"></script>

</body>
</html>
